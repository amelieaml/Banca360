<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banca360 - Seguridad</title>
    <link rel="stylesheet" href="Style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard.html" class="nav-logo">Banca360</a>
        </div>
    </nav>

    <main class="page-content-wrapper">
        <div class="form-wrapper-custom">
            <div class="task-card-custom">
                <div class="profile-header">
                    <h1>Preguntas de seguridad</h1>
                </div>

                <form id="securityForm" class="task-form-custom">
                    
                    <fieldset class="form-section-container">
                        <legend class="custom-section-title">Pregunta de Seguridad 1</legend>
                        <div class="form-group">
                            <label>Selecciona una pregunta</label>
                            <div class="select-caja-flecha">
                                <select class="select-minimalista" required>
                                    <option value="" disabled selected>Elegir pregunta...</option>
                                    <option>¿Cuál es el nombre de tu primera mascota?</option>
                                    <option>¿En qué ciudad se conocieron tus padres?</option>
                                    <option>¿Cuál es el segundo nombre de tu abuela?</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Tu respuesta</label>
                            <div class="input-with-icon">
                                <span class="icon-perfil"><span class="material-symbols-outlined">verified_user</span></span>
                                <input type="text" required placeholder="Escribe tu respuesta aquí">
                            </div>
                        </div>
                    </fieldset>

                    <fieldset class="form-section-container">
                        <legend class="custom-section-title">Pregunta de Seguridad 2</legend>
                        <div class="form-group">
                            <label>Selecciona una pregunta</label>
                            <div class="select-caja-flecha">
                                <select class="select-minimalista" required>
                                    <option value="" disabled selected>Elegir pregunta...</option>
                                    <option>¿Nombre de tu escuela primaria?</option>
                                    <option>¿Nombre de tu mejor amigo de la infancia?</option>
                                    <option>¿Cuál es tu libro favorito?</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Tu respuesta</label>
                            <div class="input-with-icon">
                                <span class="icon-perfil"><span class="material-symbols-outlined">verified_user</span></span>
                                <input type="text" required placeholder="Escribe tu respuesta aquí">
                            </div>
                        </div>
                    </fieldset>

                    <fieldset class="form-section-container">
                        <legend class="custom-section-title">Pregunta de Seguridad 3</legend>
                        <div class="form-group">
                            <label>Selecciona una pregunta</label>
                            <div class="select-caja-flecha">
                                <select class="select-minimalista" required>
                                    <option value="" disabled selected>Elegir pregunta...</option>
                                    <option>¿Cuál es el tu color favorito?</option>
                                    <option>¿Cuál es el nombre de tu profesor favorito?</option>
                                    <option>¿Nombre de la ciudad donde naciste?</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Tu respuesta</label>
                            <div class="input-with-icon">
                                <span class="icon-perfil"><span class="material-symbols-outlined">verified_user</span></span>
                                <input type="text" required placeholder="Escribe tu respuesta aquí">
                            </div>
                        </div>
                    </fieldset>

                    <div class="form-footer-actions">
                        <button type="submit" class="btn-submit-full">Finalizar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
