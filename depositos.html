    <main class="page-content-wrapper">
        <div class="form-wrapper-custom">
            <div class="task-card-custom">
                <div class="header-task">
                    <h3>Depósitos</h3>
                    <p>Módulo de simulación de entrada de dinero</p>
                </div>

                <form id="deposit-form" class="task-form-custom">
                    <fieldset class="form-section-container">
                        
                        <div class="form-group amount-group">
                            <label style="text-align: center; display: block;">Monto a depositar</label>
                            <div class="amount-container">
                                <span class="currency-label">Bs</span>
                                <input type="text" 
                                       id="deposit-amount" 
                                       inputmode="decimal" 
                                       placeholder="0.00" 
                                       required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Cuenta de destino</label>
                                <div class="select-caja-flecha">
                                    <select class="select-minimalista" required>
                                        <option value="corriente">Cuenta Corriente - *4567</option>
                                        <option value="ahorro">Cuenta de Ahorro - *8821</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label>Método de ingreso</label>
                                <div class="select-caja-flecha">
                                    <select class="select-minimalista" required>
                                        <option value="efectivo">Efectivo</option>
                                        <option
